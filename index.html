<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Social Media Icons Homework</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Cormorant+Upright:wght@300;400;500;600;700&family=Dancing+Script:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Satisfy&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">

</head>

<body>


    <div class="gridContainer">
        <header>

        <h1>N<sup>e</sup>v<sup>e</sup></h1>
        <h2>Web Developer</h2>

        </header>

        <main>

            
            <div class="img-wrapper">
                
                <div class="cloud-container">
                <img src="assets/img/cloudfortalking.svg" alt="cloud with words" class="cloud">

                <div id="textContainer">
                    <span id="invisibleWhenSmall">Hey guys, <br>if you want to know more <br>about me,  </span>click on my <br>social media links... <br>if you can find them!
                </div>

                </div>

                <img   src="assets/img/girlonhercomputeroutline.svg" alt="girl with a laptop - black and white"  class="girl">

                

                <input type="checkbox" id="reveal" hidden>

                    <label for="reveal" class="bingo">

                        <div class="links">
                            <a href="https://www.youtube.com/@Digitalishous" target="_blank">
                            <img src="assets/img/yt_icon_rectangle_red.svg" alt="YouTube link">
                            </a>

                            <a href="https://www.facebook.com/people/Digitalishous/61579705198926/" target="_blank">
                            <img src="assets/img/facebookIcon_Blue_Circle.svg" alt="Facebook link">
                            </a>
                        </div>

                    </label>

        

            </div>

        </main>


        <span class="notIt"></span>
        <span class="notIt"></span>
        <span class="notIt"></span>
        


    </div>


    

</body>
</html>
